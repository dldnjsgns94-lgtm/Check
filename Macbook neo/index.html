        .loader { width: 30px; height: 30px; border: 3px solid #f3f3f3; border-top: 3px solid #007aff; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }

        h1 { font-size: 20px; color: #1d1d1f; }
        p { color: #86868b; font-size: 14px; }
    </style>
</head>
<body>
    <div class="box">

    </div>
    <script>
        setTimeout(function() {
            window.location.href = "https://link.coupang.com/a/dGg2caDdcG";
        }, 2000);

</body>
</html>
